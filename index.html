<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リアルタイム対戦・投票システム</title>
  <link rel="stylesheet" href="style.css">
  <!-- PeerJS & QRCode CDN -->
  <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
</head>

<body>
  <div class="container">
    <!-- TITLE SCREEN -->
    <div id="screen-title" class="screen active">
      <div class="card" style="text-align: center;">
        <h1>⚔️ Realtime Tournament</h1>
        <p class="subtitle">役割を選択してください</p>
        <div class="button-group" style="display: flex; flex-direction: column; gap: 0.75rem;">
          <button class="btn btn-primary" onclick="goToHost()">ホスト（部屋作成）</button>
          <button class="btn btn-success" onclick="goToPlayer()">プレイヤー（対戦参加）</button>
          <button class="btn btn-warning" onclick="goToVoteLogin()">観戦者（投票参加）</button>
        </div>
      </div>
    </div>

    <!-- HOST SCREEN -->
    <div id="screen-host" class="screen screen-host-layout">
      <!-- 左50%: 参加プレイヤー一覧 & 勝者選択 -->
      <div class="host-left">
        <div class="card">
          <h2>🎮 参加プレイヤー (<span id="player-count">0</span>)</h2>
          <p class="subtitle">プレイヤー名をタップして勝者を選択してください</p>
          <div id="host-player-list"></div>
        </div>
      </div>

      <!-- 右50%: ステータス・操作コントロール -->
      <div class="host-right">
        <div class="card">
          <div id="host-state-badge" class="badge badge-waiting" style="margin-bottom: 1rem; width: 100%;">状態: WAITING
          </div>

          <div class="form-group">
            <label>参加コード</label>
            <div class="room-code-display" id="host-room-code">------</div>
          </div>

          <div id="qrcode-container">
            <div id="qrcode"></div>
            <div class="qr-caption">スマホでQRを読み込んで参加</div>
          </div>

          <div id="host-peer-status" class="subtitle" style="margin-top: 0.5rem;"></div>

          <div class="button-group" style="display: flex; flex-direction: column; gap: 0.5rem; margin-top: 1rem;">
            <button id="btn-start-pred" class="btn btn-secondary" onclick="startPrediction()">大会優勝予想開始</button>
            <button id="btn-start-vote" class="btn btn-primary" onclick="startVoting()">マッチ投票開始</button>
            <button id="btn-end-vote" class="btn btn-warning" onclick="endVoting()">投票締切</button>
            <button id="btn-calc-result" class="btn btn-success" onclick="announceWinner()">勝者決定・ポイント計算</button>
            <button id="btn-end-tournament" class="btn btn-danger" onclick="endTournament()">ゲーム終了</button>
          </div>
        </div>
      </div>
    </div>

    <!-- PLAYER SCREEN -->
    <div id="screen-player" class="screen">
      <div class="card">
        <h2>🎮 プレイヤー画面</h2>
        <div id="player-join-form">
          <div class="form-group">
            <label>参加コード</label>
            <input type="text" id="input-room-code" placeholder="例: A1B2C3" style="text-transform: uppercase;">
          </div>
          <div class="form-group">
            <label>プレイヤー名</label>
            <input type="text" id="input-player-name" placeholder="例: 太郎">
          </div>
          <button class="btn btn-primary" onclick="joinGame()">参加する</button>
        </div>
        <div id="player-joined-info" style="display:none; text-align: center;">
          <p class="subtitle">参加中のプレイヤー名</p>
          <h3 id="player-display-name" style="color: var(--primary); margin-bottom: 1rem;">-</h3>
          <div id="player-status-message" class="badge badge-waiting">対戦準備中</div>
        </div>
      </div>
    </div>

    <!-- VOTE LOGIN SCREEN -->
    <div id="screen-vote-login" class="screen">
      <div class="card">
        <h2>🗳️ 観戦者参加</h2>
        <div class="form-group">
          <label>参加コード</label>
          <input type="text" id="input-vote-room-code" placeholder="例: A1B2C3" style="text-transform: uppercase;">
        </div>
        <button class="btn btn-primary" onclick="joinAsVote()">接続する</button>
      </div>
    </div>

    <!-- VOTE MAIN SCREEN -->
    <div id="screen-vote" class="screen">
      <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 0.5rem;">
          <h2>🗳️ 観戦・投票</h2>
          <span id="vote-state-badge" class="badge badge-waiting">WAITING</span>
        </div>
        <p class="subtitle">参加者名: <strong id="display-voter-name">-</strong> | 部屋: <strong
            id="vote-room-code-display">-</strong></p>
        <div id="vote-connect-status" class="subtitle"></div>

        <!-- 名前未登録時フォーム -->
        <div id="vote-name-form" style="display:none;">
          <div class="form-group">
            <label>あなたのお名前</label>
            <input type="text" id="input-voter-name" placeholder="例: ゲスト1">
          </div>
          <button id="btn-register-voter" class="btn btn-primary" onclick="registerVoter()">投票に参加する</button>
        </div>

        <!-- 投票メイン表示エリア -->
        <div id="vote-main-section" style="display:none;">
          <!-- 大会優勝予想 -->
          <div id="prediction-section"
            style="display:none; margin-bottom: 1.5rem; padding-bottom: 1rem; border-bottom: 1px solid var(--card-border);">
            <h3>🏆 大会優勝予想</h3>
            <p class="subtitle">優勝すると思うプレイヤーを1人選択してください</p>
            <div id="pred-player-list"></div>
            <button id="btn-submit-pred" class="btn btn-warning" onclick="submitPrediction()"
              style="margin-top:0.5rem;">優勝予想を送信</button>
          </div>

          <!-- 所持ポイント表示 -->
          <div id="vote-points-header" style="text-align: center; margin-bottom: 1rem;">
            <span style="font-size: 0.85rem; color: var(--text-sub);">所持ポイント</span>
            <div class="point-display"><span id="viewer-points">50</span> pt</div>
          </div>

          <!-- マッチ投票フォームエリア -->
          <div id="vote-form-area">
            <h3>⚔️ マッチ勝者予想</h3>
            <p class="subtitle">勝つと思う選手を選択してポイントを賭けてください</p>
            <div id="vote-player-list" style="margin-bottom: 1rem;"></div>

            <div class="form-group">
              <label>賭けるポイント</label>
              <input type="number" id="input-bet-point" value="10" min="1" max="1000">
            </div>
            <button id="btn-submit-vote" class="btn btn-primary" onclick="submitVote()">投票する</button>
          </div>

          <!-- 結果・締切・終了表示エリア -->
          <div id="vote-result-section" style="display:none;"></div>
        </div>
      </div>
    </div>

    <!-- HOST RANKING MODAL -->
    <div id="ranking-modal"
      style="display:none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.8); z-index: 1000; padding: 1rem;">
      <div class="card" style="max-width: 500px; margin: 2rem auto; position: relative;">
        <h2>🏆 最終結果ランキング</h2>
        <ol id="ranking-list" class="ranking-list" style="list-style: none; padding: 0; margin-top: 1rem;"></ol>
        <button class="btn btn-secondary" onclick="closeRanking()" style="margin-top: 1.5rem;">閉じる</button>
      </div>
    </div>
  </div>
  <script src="app.js"></script>
</body>

</html>
