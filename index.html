<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>リアルタイム対戦・投票システム</title>

  <!-- CSSファイルの読み込み -->
  <link rel="stylesheet" href="style.css">

  <!-- QRコード生成ライブラリ -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>

  <!-- PeerJS（P2P通信ライブラリ） -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/peerjs/1.5.2/peerjs.min.js"></script>
</head>

<body>

  <div class="container">

    <!-- ==================== TITLE SCREEN ==================== -->
    <div id="screen-title" class="screen active">
      <div class="card" style="text-align: center;">
        <h1 style="font-size: 1.8rem; margin-bottom: 0.5rem;">🎮 リアルタイム対戦</h1>
        <p class="subtitle">役割を選択してスタートしてください</p>

        <div style="display: flex; flex-direction: column; gap: 1rem; margin-top: 1.5rem;">
          <button class="btn btn-primary" onclick="goToHost()">👑 Host（部屋を作る）</button>
          <button class="btn btn-success" onclick="goToPlayer()">🎮 Join（プレイヤーとして参加）</button>
        </div>
      </div>
    </div>

    <!-- ==================== HOST SCREEN ==================== -->
    <div id="screen-host" class="screen">
      <div class="card">
        <h1>👑 Host（ゲーム管理）</h1>
        <div style="text-align: center; margin-bottom: 1rem;">
          <span id="host-state-badge" class="badge badge-waiting">状態: 待機中</span>
        </div>

        <div class="form-group">
          <label>参加コード</label>
          <div id="host-room-code" class="room-code-display">------</div>
        </div>

        <p id="host-peer-status" class="subtitle" style="margin-bottom: 1rem;">Peer初期化中...</p>

        <div id="qrcode-container">
          <div id="qrcode"></div>
          <span class="qr-caption">📱 スマホで読み込んで投票画面へ</span>
        </div>

        <button id="btn-start-vote" class="btn btn-primary" onclick="startVoting()">▶ 投票開始</button>
        <button id="btn-end-vote" class="btn btn-danger" onclick="endVoting()" disabled>⏹ 投票終了</button>
      </div>

      <div class="card">
        <h2>参加プレイヤー (<span id="player-count">0</span>)</h2>
        <div id="host-player-list">
          <p class="subtitle">プレイヤーの参加を待っています...</p>
        </div>

        <div id="winner-select-section" style="margin-top: 1.5rem; display: none;">
          <h3>🏆 勝者選択</h3>
          <p class="subtitle">勝者を選択して集計を行ってください</p>
          <button id="btn-calc-result" class="btn btn-success" onclick="announceWinner()" disabled>勝者決定・ポイント分配</button>
        </div>
      </div>
    </div>

    <!-- ==================== PLAYER SCREEN ==================== -->
    <div id="screen-player" class="screen">
      <div class="card">
        <h1>🎮 Player（参加画面）</h1>
        <p class="subtitle">参加コードと名前を入力してゲームに参加します</p>

        <div id="player-join-form">
          <div class="form-group">
            <label>参加コード</label>
            <input type="text" id="input-room-code" placeholder="コードを入力" style="text-transform: uppercase;">
          </div>
          <div class="form-group">
            <label>プレイヤー名</label>
            <input type="text" id="input-player-name" placeholder="例: タロウ">
          </div>
          <button class="btn btn-primary" onclick="joinGame()">ゲームに参加する</button>
          <button class="btn btn-secondary" onclick="goToTitle()" style="margin-top: 0.5rem;">タイトルへ戻る</button>
        </div>

        <div id="player-joined-info" style="display: none; text-align: center;">
          <div class="badge badge-voting" style="margin-bottom: 1rem;">参加中</div>
          <h2 id="player-display-name">---</h2>
          <p class="subtitle">ホストの進行を待っています。<br>ゲームプレイに集中してください！</p>
        </div>
      </div>
    </div>

    <!-- ==================== VOTE SCREEN ==================== -->
    <div id="screen-vote" class="screen">
      <div class="card">
        <h1>🎲 Vote（観戦・投票）</h1>
        <p class="subtitle">ルーム: <strong id="vote-room-code-display">------</strong></p>
        <p id="vote-connect-status" class="subtitle">接続中...</p>

        <div class="point-display"><span id="viewer-points">50</span> <span style="font-size: 1rem;">pt</span></div>

        <div id="vote-status-msg" style="text-align: center; margin-bottom: 1rem;">
          <span id="vote-state-badge" class="badge badge-waiting">待機中</span>
        </div>

        <div class="form-group">
          <label>賭けポイント</label>
          <input type="number" id="input-bet-point" min="1" value="10">
        </div>

        <label>投票先プレイヤーを選択</label>
        <div id="vote-player-list" style="margin-bottom: 1rem;">
          <p class="subtitle">プレイヤーがまだいません</p>
        </div>

        <button id="btn-submit-vote" class="btn btn-primary" onclick="submitVote()" disabled>投票する</button>

        <div id="vote-result-banner"></div>
      </div>
    </div>

  </div>

  <!-- JavaScriptファイルの読み込み -->
  <script src="app.js"></script>
</body>

</html>
