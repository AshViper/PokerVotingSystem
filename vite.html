<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>P2P Voting</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #1a1a2e;
      color: #eee;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      padding: 2rem;
    }
    #app { max-width: 600px; width: 100%; }
    h1 { color: #e94560; margin-bottom: 1rem; }
    h2 { color: #0f3460; margin: 1rem 0 0.5rem; }
    .room-code {
      font-size: 2.5rem;
      font-weight: bold;
      letter-spacing: 0.5rem;
      text-align: center;
      padding: 1rem;
      background: #16213e;
      border-radius: 8px;
      margin: 1rem 0;
    }
    .qr-code { text-align: center; margin: 1rem 0; }
    .qr-code canvas { max-width: 200px; }
    input, button {
      padding: 0.75rem;
      margin: 0.25rem 0;
      border: none;
      border-radius: 4px;
      font-size: 1rem;
      width: 100%;
      display: block;
    }
    input { background: #16213e; color: #eee; }
    button {
      background: #e94560;
      color: #fff;
      cursor: pointer;
      font-weight: bold;
    }
    button:hover { background: #c73650; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    ul { list-style: none; }
    li {
      padding: 0.5rem;
      background: #16213e;
      margin: 0.25rem 0;
      border-radius: 4px;
    }
    .player-option {
      display: block;
      padding: 0.5rem;
      margin: 0.25rem 0;
      background: #16213e;
      border-radius: 4px;
      cursor: pointer;
    }
    .player-option input { width: auto; margin-right: 0.5rem; display: inline; }
    .status { margin-top: 0.5rem; padding: 0.5rem; border-radius: 4px; }
    .status.connected { background: #2ecc71; color: #fff; }
    .status.error { background: #e74c3c; color: #fff; }
    .result-item {
      padding: 0.5rem;
      margin: 0.25rem 0;
      background: #16213e;
      border-radius: 4px;
    }
    .landing { text-align: center; }
    .landing hr { margin: 1.5rem 0; border-color: #333; }
    .join-form input { margin-bottom: 0.5rem; }
  </style>
</head>
<body>
  <div id="app"></div>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
